<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="100%" style="stop-color:#0d0d14"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E94560"/>
      <stop offset="100%" style="stop-color:#ff5a75"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:rgba(233,69,96,0.3)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:rgba(0,229,191,0.2)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Ambient glows -->
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo mark -->
  <g transform="translate(510, 160) scale(1.8)">
    <path fill="url(#logoGrad)" d="M54,25 L30,80 L40,80 L54,48 L68,80 L78,80 L54,25 Z"/>
    <line x1="36" y1="85" x2="72" y2="85" stroke="url(#logoGrad)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- VRoom text -->
  <text x="600" y="420" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="900" font-size="72" fill="white" letter-spacing="-0.02em">VRoom</text>

  <!-- Tagline -->
  <text x="600" y="475" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="28" fill="#8888a0">La strada. Nient'altro.</text>

  <!-- Bottom accent line -->
  <rect x="520" y="520" width="160" height="3" rx="1.5" fill="url(#logoGrad)" opacity="0.6"/>
</svg>
